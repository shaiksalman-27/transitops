<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TransitOps</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-wrap">

    <!-- Left Side -->
    <div class="auth-side">

        <div class="brand">
            <span class="brand-mark"></span>
            TransitOps
        </div>

        <div>
            <blockquote>
                "Manage vehicles, routes, drivers and alerts from one powerful dashboard."
            </blockquote>

            <cite>
                Smart Transport Operations Platform
            </cite>
        </div>

    </div>

    <!-- Right Side -->

    <div class="auth-main">

        <form class="auth-form" id="loginForm">

            <h1>Welcome Back</h1>

            <p>
                Login to continue managing your transport operations.
            </p>

            <div class="form-error" id="formError">
                Invalid email or password.
            </div>

            <div class="field">
                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="field">
                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="field-row">

                <label class="checkbox-wrap">

                    <input type="checkbox">

                    Remember me

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button class="btn btn-primary" type="submit">
                Login
            </button>

            <div class="auth-alt">
                Don't have an account?
                <a href="#">Contact Administrator</a>
            </div>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
